<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armaf Paid Media Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f4;
      --panel: #ffffff;
      --ink: #151515;
      --muted: #656565;
      --line: #deded9;
      --soft: #eeeee9;
      --accent: #1f6f5b;
      --accent-2: #b8563c;
      --accent-3: #2f5f9f;
      --accent-4: #86632f;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.4;
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 760;
      letter-spacing: 0;
    }
    .subtle { color: var(--muted); font-size: 13px; }
    main { padding: 20px 32px 32px; }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    select, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      min-height: 40px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .metric { padding: 14px; }
    .metric strong { display: block; font-size: 22px; line-height: 1.1; }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      margin-top: 7px;
      letter-spacing: .04em;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(360px, .8fr);
      gap: 16px;
      align-items: start;
    }
    .panel { padding: 16px; overflow: hidden; }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .chart-wrap { min-height: 260px; }
    svg { width: 100%; height: auto; display: block; }
    .axis { stroke: #d8d8d2; stroke-width: 1; }
    .bar { fill: var(--accent); }
    .bar:nth-of-type(2n) { fill: var(--accent-3); }
    .line { fill: none; stroke: var(--accent-2); stroke-width: 3; }
    .dot { fill: var(--accent-2); }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .ad-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
      min-width: 0;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--soft);
      display: block;
    }
    .ad-body { padding: 10px; }
    .ad-title {
      font-size: 13px;
      font-weight: 700;
      min-height: 36px;
      overflow-wrap: anywhere;
    }
    .ad-meta {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .ad-meta strong { color: var(--ink); font-weight: 700; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      white-space: nowrap;
    }
    td {
      border-bottom: 1px solid var(--soft);
      padding: 9px 8px;
      vertical-align: top;
    }
    td:last-child, th:last-child { text-align: right; }
    a { color: var(--accent-3); text-decoration: none; }
    .scroll { overflow: auto; max-height: 520px; }
    @media (max-width: 1100px) {
      .controls, .metrics, .grid { grid-template-columns: 1fr 1fr; }
      .grid > .panel:first-child { grid-column: 1 / -1; }
    }
    @media (max-width: 720px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .controls, .metrics, .grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
    }
  </style>
</head>

    const $ = (id) => document.getElementById(id);
    const formatNumber = (value) => Math.round(Number(value || 0)).toLocaleString('en-US');
    const formatMoney = (value) => '$' + Number(value || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const formatPct = (value) => Number(value || 0).toFixed(2) + '%';
    const metricFormat = (metric, value) => metric === 'spend' ? formatMoney(value) : metric === 'ctr' ? formatPct(value) : formatNumber(value);
    const allAds = REPORTS.flatMap((report) => report.ads.map((ad) => ({ ...ad, reportLabel: report.label })));

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function initFilters() {
      for (const report of REPORTS) $('periodFilter').insertAdjacentHTML('beforeend', '<option value="' + esc(report.label) + '">' + esc(report.label) + '</option>');
      const campaigns = [...new Set(allAds.map((ad) => ad.campaign_name).filter(Boolean))].sort();
      for (const campaign of campaigns) $('campaignFilter').insertAdjacentHTML('beforeend', '<option value="' + esc(campaign) + '">' + esc(campaign) + '</option>');
      ['periodFilter', 'campaignFilter', 'metricFilter', 'searchFilter'].forEach((id) => $(id).addEventListener('input', render));
    }

    function getFiltered() {
      const period = $('periodFilter').value;
      const campaign = $('campaignFilter').value;
      const search = $('searchFilter').value.trim().toLowerCase();
      return allAds.filter((ad) => {
        const haystack = [ad.ad_name, ad.adset_name, ad.campaign_name, ad.creative?.body, ad.creative?.title].join(' ').toLowerCase();
        return (period === 'all' || ad.reportLabel === period)
          && (campaign === 'all' || ad.campaign_name === campaign)
          && (!search || haystack.includes(search));
      });
    }

    function aggregate(rows) {
      const total = rows.reduce((acc, row) => {
        acc.spend += Number(row.spend || 0);
        acc.impressions += Number(row.impressions || 0);
        acc.reach += Number(row.reach || 0);
        acc.clicks += Number(row.clicks || 0);
        acc.engagements += Number(row.engagements || 0);
        return acc;
      }, { spend: 0, impressions: 0, reach: 0, clicks: 0, engagements: 0 });
      total.ctr = total.impressions ? total.clicks / total.impressions * 100 : 0;
      return total;
    }

    function renderMetrics(rows) {
      const total = aggregate(rows);
      $('metrics').innerHTML = [
        ['Amount', formatMoney(total.spend)],
        ['Impressions', formatNumber(total.impressions)],
        ['Reach', formatNumber(total.reach)],
        ['Clicks', formatNumber(total.clicks)],
        ['Engagements', formatNumber(total.engagements)],
        ['CTR', formatPct(total.ctr)],
      ].map(([label, value]) => '<div class="metric"><strong>' + value + '</strong><span>' + label + '</span></div>').join('');
    }

    function renderPeriodChart(rows) {
      const metric = $('metricFilter').value;
      const grouped = REPORTS.map((report) => ({ label: report.label, ...aggregate(rows.filter((ad) => ad.reportLabel === report.label)) }));
      $('periodChart').innerHTML = barLineChart(grouped, metric, 780, 260);
    }

    function renderAdChart(rows) {
      const metric = $('metricFilter').value;
      const top = [...rows].sort((a, b) => Number(b[metric] || 0) - Number(a[metric] || 0)).slice(0, 12);
      $('adChart').innerHTML = horizontalBarChart(top, metric, 980, 300);
    }

    function barLineChart(rows, metric, width, height) {
      const pad = { top: 18, right: 28, bottom: 54, left: 54 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const maxMetric = Math.max(1, ...rows.map((row) => Number(row[metric] || 0)));
      const maxCtr = Math.max(1, ...rows.map((row) => Number(row.ctr || 0)));
      const barW = chartW / Math.max(rows.length, 1) * 0.55;
      const points = rows.map((row, i) => {
        const x = pad.left + chartW / rows.length * i + chartW / rows.length / 2;
        const y = pad.top + chartH - (Number(row.ctr || 0) / maxCtr) * chartH;
        return x + ',' + y;
      }).join(' ');
      const bars = rows.map((row, i) => {
        const slot = chartW / rows.length;
        const h = (Number(row[metric] || 0) / maxMetric) * chartH;
        const x = pad.left + slot * i + (slot - barW) / 2;
        const y = pad.top + chartH - h;
        return '<rect class="bar" x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="4"></rect>'
          + '<text x="' + (x + barW / 2) + '" y="' + (height - 30) + '" text-anchor="middle" font-size="11" fill="#656565">' + esc(row.label.replace(' 2026', '')) + '</text>'
          + '<text x="' + (x + barW / 2) + '" y="' + (y - 6) + '" text-anchor="middle" font-size="11" fill="#151515">' + esc(metricFormat(metric, row[metric])) + '</text>';
      }).join('');
      const dots = rows.map((row, i) => {
        const [x, y] = points.split(' ')[i].split(',');
        return '<circle class="dot" cx="' + x + '" cy="' + y + '" r="4"></circle>';
      }).join('');
      return '<svg viewBox="0 0 ' + width + ' ' + height + '" role="img">'
        + '<line class="axis" x1="' + pad.left + '" y1="' + (pad.top + chartH) + '" x2="' + (width - pad.right) + '" y2="' + (pad.top + chartH) + '"></line>'
        + '<line class="axis" x1="' + pad.left + '" y1="' + pad.top + '" x2="' + pad.left + '" y2="' + (pad.top + chartH) + '"></line>'
        + bars + '<polyline class="line" points="' + points + '"></polyline>' + dots + '</svg>';
    }

    function horizontalBarChart(rows, metric, width, height) {
      const pad = { top: 16, right: 120, bottom: 16, left: 300 };
      const rowH = Math.max(20, (height - pad.top - pad.bottom) / Math.max(rows.length, 1));
      const maxMetric = Math.max(1, ...rows.map((row) => Number(row[metric] || 0)));
      const items = rows.map((row, i) => {
        const y = pad.top + i * rowH + 3;
        const w = (Number(row[metric] || 0) / maxMetric) * (width - pad.left - pad.right);
        const label = row.ad_name.length > 44 ? row.ad_name.slice(0, 43) + '...' : row.ad_name;
        return '<text x="0" y="' + (y + 13) + '" font-size="11" fill="#151515">' + esc(label) + '</text>'
          + '<rect class="bar" x="' + pad.left + '" y="' + y + '" width="' + w + '" height="' + (rowH - 7) + '" rx="4"></rect>'
          + '<text x="' + (pad.left + w + 8) + '" y="' + (y + 13) + '" font-size="11" fill="#656565">' + esc(metricFormat(metric, row[metric])) + '</text>';
      }).join('');
      return '<svg viewBox="0 0 ' + width + ' ' + height + '" role="img">' + items + '</svg>';
    }

    function renderReports() {
      $('reportTable').innerHTML = '<thead><tr><th>Period</th><th>Amount</th><th>Source spend</th><th>Rows</th><th>PDF</th></tr></thead><tbody>'
        + REPORTS.map((report) => {
          const sourceSpend = report.modeling?.spendFactor ? report.total.spend / report.modeling.spendFactor : report.total.spend;
          return '<tr><td>' + esc(report.label) + '</td><td>' + formatMoney(report.total.spend) + '</td><td>' + formatMoney(sourceSpend) + '</td><td>' + formatNumber(report.matchedRows) + '</td><td><a href="' + esc(report.pdf) + '">Open</a></td></tr>';
        }).join('') + '</tbody>';
    }

    function renderAds(rows) {
      const sorted = [...rows].sort((a, b) => Number(b.spend || 0) - Number(a.spend || 0));
      $('adGrid').innerHTML = sorted.map((ad) => {
        const thumb = ad.creative?.thumbnail_url || '';
        return '<article class="ad-card">'
          + (thumb ? '<img class="thumb" src="' + esc(thumb) + '" alt="">' : '<div class="thumb"></div>')
          + '<div class="ad-body"><div class="ad-title">' + esc(ad.ad_name) + '</div>'
          + '<div class="subtle">' + esc(ad.reportLabel) + ' | ' + esc(ad.adset_name || '') + '</div>'
          + '<div class="ad-meta"><span>Amount<br><strong>' + formatMoney(ad.spend) + '</strong></span><span>CTR<br><strong>' + formatPct(ad.ctr) + '</strong></span><span>Impr.<br><strong>' + formatNumber(ad.impressions) + '</strong></span><span>Clicks<br><strong>' + formatNumber(ad.clicks) + '</strong></span></div>'
          + '</div></article>';
      }).join('') || '<div class="subtle">No ads match the current filters.</div>';
    }

    function render() {
      const rows = getFiltered();
      renderMetrics(rows);
      renderPeriodChart(rows);
      renderAdChart(rows);
      renderReports();
      renderAds(rows);
    }

    initFilters();
    render();
  </script>
